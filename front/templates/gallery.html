<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Преемственность</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-btn" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-btn active" href="/gallery">Галерея</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-btn" href="/about">О нас</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section-sm fade-up">
        <div class="container">
            <h1 class="hero-title">Галерея встреч</h1>
            <p class="hero-subtitle">Мгновения наших литературных вечеров</p>
        </div>
    </div>

    <div class="section gallery-section">
        <div class="container">
            {{if .Files}}
            <div class="gallery-grid">
                {{range .Files}}
                <div class="gallery-item" onclick="openLightbox('/static/photos/{{.}}', '{{if isImage .}}image{{else}}video{{end}}')">
                    {{if isImage .}}
                    <img src="/static/photos/{{.}}" alt="Фото с мероприятия" loading="lazy">
                    {{else}}
                    <video src="/static/photos/{{.}}" muted loop playsinline></video>
                    <div class="play-indicator">▶</div>
                    {{end}}
                </div>
                {{end}}
            </div>
            {{else}}
            <div class="empty-state">
                <div class="empty-icon">🖼️</div>
                <h3>Здесь пока тихо</h3>
                <p class="text-muted">Фотографии с встреч скоро появятся</p>
            </div>
            {{end}}
        </div>
    </div>

    <!-- Футер -->
    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Книжный клуб. Читаем с душой.</p>
        </div>
    </footer>

    <!-- Лайтбокс -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-content" id="lightboxContent" onclick="event.stopPropagation()"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        function openLightbox(src, type) {
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightboxContent');
            
            if (type === 'image') {
                content.innerHTML = `<img src="${src}" alt="Просмотр фото">`;
            } else {
                content.innerHTML = `<video src="${src}" controls autoplay></video>`;
            }
            
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightboxContent');
            
            lightbox.classList.remove('active');
            
            const video = content.querySelector('video');
            if (video) {
                video.pause();
                video.currentTime = 0;
            }
            
            content.innerHTML = '';
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
