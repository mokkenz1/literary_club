{{define "base.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">📖 Книжный клуб</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {{if eq .Active "home"}}active{{end}}" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .Active "gallery"}}active{{end}}" href="/gallery">Галерея</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .Active "about"}}active{{end}}" href="/about">О нас</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {{template "content" .}}

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Книжный клуб. Читаем с душой.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
